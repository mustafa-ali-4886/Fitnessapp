<!DOCTYPE html>
<html lang="en">
<head>
	<link rel="icon" type="image/x-icon" href="favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Forgot Password</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="reveal-animations.css">

    <link rel="stylesheet"
    href="https://dribbble.com/shots/27230601-Website-Login-Page-Design">

</head>

<body>

<div class="container">

    <div class="left-section">

    </div>

    <div class="right-section">

        <div class="login-box reveal">

            <div class="login-logo">

                <img src="Logo-v2.png"
                alt="Fitness Logo">

            </div>

            <h1>Forgot Password</h1>

            <p>
                Enter your email to reset password
            </p>

            <form action="forgetpassword.php"
            method="POST">

                <label>Email Address</label>

                <div class="input-box">

                    <i class="fa-regular fa-envelope"></i>

                    <input type="email"
                    name="email"
                    required>

                </div>

                <button type="submit"
                class="login-btn">

                    Send OTP

                </button>

                <div class="register-link">

                    Back to

                    <a href="login.html">
                        Login
                    </a>

                </div>

            </form>

        </div>

    </div>

</div>

<script src="zf-animations.js"></script>
</body>
</html>
